<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Personalized Drug Recommender</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

  <style>
    body {
      background-color: #111;
      color: #f5f5f5;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navbar Styling */
    .navbar {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    }

    .navbar-brand {
      font-size: 1.3rem;
      letter-spacing: 0.6px;
      color: #0dcaf0 !important;
      transition: text-shadow 0.3s ease;
    }

    .navbar-brand:hover {
      text-shadow: 0 0 10px rgba(13, 202, 240, 0.8);
    }

    .nav-link {
      color: #aaa !important;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #0dcaf0 !important;
    }

    .container-lg {
      max-width: 1300px;
    }

    .alert {
      border-radius: 10px;
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      background: #000;
      color: #888;
      font-size: 0.9rem;
      padding: 1rem 0;
      text-align: center;
      border-top: 1px solid #222;
      margin-top: 2rem;
    }
  </style>
</head>

<body class="bg-dark text-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">💊 Personalized Drug Recommender</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link fw-semibold" href="{{ url_for('about') }}">About</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="container-lg py-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-warning text-dark fw-semibold mb-4 shadow">
          {% for msg in messages %}
            <div>{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <!-- Footer -->
  <footer>
    © {{ 2025 }} Personalized Drug Recommender | Developed with ❤️ for smarter healthcare
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
